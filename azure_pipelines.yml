trigger:
- main

pool:
  vmImage: ubuntu-latest

parameters:
- name: action
  displayName: Select Action
  type: string
  default: deploy
  values:
  - deploy
  - destroy

variables:
  terraformVersion: '1.8.5'
  serviceConnection: 'Azure-ServiceConnection'

stages:
- stage: Build
  displayName: 'Build - Terraform Validate and Plan'
  jobs:
  - job: TerraformBuild
    displayName: 'Terraform Init Validate Plan'
    steps:
    - checkout: self

    - script: |
        sudo apt-get update
        sudo apt-get install -y unzip wget
        wget https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip
        unzip terraform_$(terraformVersion)_linux_amd64.zip
        sudo mv terraform /usr/local/bin/
        terraform -version
      displayName: 'Install Terraform'

    - task: AzureCLI@2
      displayName: 'Terraform Init Validate Plan'
      inputs:
        azureSubscription: '$(serviceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        addSpnToEnvironment: true
        inlineScript: |
          export ARM_CLIENT_ID=$servicePrincipalId
          export ARM_CLIENT_SECRET=$servicePrincipalKey
          export ARM_TENANT_ID=$tenantId
          export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

          terraform init -reconfigure
          terraform validate
          terraform plan -out=tfplan

- stage: Deploy
  displayName: 'Deploy - Terraform Apply'
  dependsOn: Build
  condition: and(succeeded(), eq('${{ parameters.action }}', 'deploy'))
  jobs:
  - deployment: TerraformDeploy
    displayName: 'Create Azure VM Infrastructure'
    environment: 'dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - script: |
              sudo apt-get update
              sudo apt-get install -y unzip wget
              wget https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip
              unzip terraform_$(terraformVersion)_linux_amd64.zip
              sudo mv terraform /usr/local/bin/
              terraform -version
            displayName: 'Install Terraform'

          - task: AzureCLI@2
            displayName: 'Terraform Apply'
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              addSpnToEnvironment: true
              inlineScript: |
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_CLIENT_SECRET=$servicePrincipalKey
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                terraform init -reconfigure
                terraform apply -auto-approve

                echo "Terraform Output:"
                terraform output

- stage: Decommission
  displayName: 'Decommission - Terraform Destroy'
  dependsOn: Build
  condition: and(succeeded(), eq('${{ parameters.action }}', 'destroy'))
  jobs:
  - deployment: TerraformDestroy
    displayName: 'Delete Azure VM Infrastructure'
    environment: 'dev-destroy'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - script: |
              sudo apt-get update
              sudo apt-get install -y unzip wget
              wget https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip
              unzip terraform_$(terraformVersion)_linux_amd64.zip
              sudo mv terraform /usr/local/bin/
              terraform -version
            displayName: 'Install Terraform'

          - task: AzureCLI@2
            displayName: 'Terraform Destroy'
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              addSpnToEnvironment: true
              inlineScript: |
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_CLIENT_SECRET=$servicePrincipalKey
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                terraform init -reconfigure
                terraform destroy -auto-approve